<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>ねこカフェ日和 / Neko Cafe</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&family=Fredoka+One&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --g:#e8a030;--gl:#f7c86a;--gd:#9a4e08;
  --pk:#f4879e;--pl:#ffd4de;--pu:#b48af4;
  --ca:#e8914a;--cl:#f7b97a;--mi:#6ecec2;
  --w:#c8825a;--wd:#7a3c1a;--wl:#e8b48a;
}
html,body{height:100%;overflow:hidden;background:#0a0604;}
body{font-family:'Zen Maru Gothic','Fredoka One',sans-serif;color:#fff;display:flex;flex-direction:column;max-width:440px;margin:0 auto;height:100vh;height:100dvh;}

/* ── LANG SELECT ── */
.lang-screen{position:fixed;inset:0;background:linear-gradient(180deg,#1a0c06,#0a0604);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;z-index:100;}
.lang-title{font-size:1.6rem;font-weight:900;color:var(--gl);text-shadow:0 0 20px rgba(247,198,106,.5);text-align:center;line-height:1.4;}
.lang-sub{font-size:.75rem;color:rgba(255,255,255,.45);text-align:center;}
.lang-btns{display:flex;gap:12px;}
.lang-btn{border:none;border-radius:16px;padding:14px 32px;font-size:.95rem;font-weight:900;font-family:inherit;cursor:pointer;transition:transform .1s,box-shadow .1s;}
.lang-btn:active{transform:translateY(3px);}
.lang-btn.ja{background:linear-gradient(180deg,#f7c86a,#e8a030);color:#3a1800;box-shadow:0 5px 0 #9a4e08,0 8px 20px rgba(232,160,48,.3);}
.lang-btn.en{background:linear-gradient(180deg,#b48af4,#8a60d4);color:#fff;box-shadow:0 5px 0 #5030a0,0 8px 20px rgba(180,138,244,.3);}
.lang-cat{font-size:3.5rem;animation:langFloat 2s ease-in-out infinite;}
@keyframes langFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* ── HUD ── */
.hud{flex-shrink:0;display:flex;align-items:center;padding:8px 12px 6px;background:rgba(8,3,1,.97);border-bottom:1px solid rgba(255,200,80,.08);gap:8px;position:relative;z-index:20;}
.hud::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(247,198,106,.2),transparent);}
.hc{flex:1;display:flex;align-items:center;gap:7px;}
.hico{font-size:1.2rem;filter:drop-shadow(0 0 6px rgba(247,198,106,.6));}
.hval{font-size:1.35rem;font-weight:900;color:var(--gl);line-height:1;letter-spacing:-.02em;}
.hrate{font-size:.52rem;color:rgba(255,210,80,.42);}
.hdiv{width:1px;background:rgba(255,255,255,.07);align-self:stretch;margin:2px 0;}
.hgems{display:flex;align-items:center;gap:4px;background:rgba(180,138,244,.1);border:1px solid rgba(180,138,244,.2);border-radius:16px;padding:4px 9px;font-size:.86rem;font-weight:900;color:var(--pu);}
.hbtns{display:flex;gap:4px;}
.hb{border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:rgba(255,255,255,.6);font-size:.58rem;font-weight:700;font-family:inherit;padding:4px 9px;border-radius:12px;cursor:pointer;}

/* ── ALERT BARS ── */
.alertbar{flex-shrink:0;display:none;align-items:center;justify-content:center;gap:8px;padding:6px 14px;font-size:.7rem;font-weight:700;border-bottom:1px solid rgba(255,255,255,.06);}
.alertbar.on{display:flex;}
.evtmr{font-size:.6rem;opacity:.6;margin-left:4px;}
.alertbar.ev{background:linear-gradient(135deg,rgba(232,160,48,.14),rgba(244,135,158,.05));}
.alertbar.ev.golden{background:linear-gradient(135deg,rgba(255,220,0,.22),rgba(255,150,0,.06));animation:gpulse 1s ease-in-out infinite;}
@keyframes gpulse{0%,100%{opacity:1}50%{opacity:.75}}
.alertbar.pn{background:linear-gradient(135deg,rgba(232,160,48,.14),rgba(244,135,158,.05));}
.pncta{border:none;border-radius:8px;padding:4px 12px;font-size:.66rem;font-weight:900;font-family:inherit;cursor:pointer;background:linear-gradient(180deg,var(--cl),var(--ca));color:#fff;box-shadow:0 2px 0 var(--gd);}

/* ── SCENE ── */
.scene{flex:1;min-height:0;position:relative;overflow:hidden;display:flex;flex-direction:column;}
.wall{flex-shrink:0;background:linear-gradient(180deg,#1a0c06,#2e1810);padding:8px 14px 5px;position:relative;}
.wall::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 100% at 50% -10%,rgba(255,190,80,.08),transparent 70%);pointer-events:none;}
.lamps{display:flex;justify-content:space-around;margin-bottom:7px;position:relative;z-index:1;}
.lamp{display:flex;flex-direction:column;align-items:center;}
.lamp-wire{width:2px;height:10px;background:rgba(200,150,80,.3);}
.lamp-body{width:24px;height:18px;background:linear-gradient(180deg,#2a1a06,#1a0e04);border-radius:50% 50% 40% 40%;border:1px solid rgba(180,140,80,.25);display:flex;align-items:center;justify-content:center;position:relative;}
.lamp-body::after{content:'';position:absolute;inset:3px;border-radius:50%;background:radial-gradient(circle,rgba(255,220,100,.9),rgba(255,160,40,.4));filter:blur(2px);}
.wins{display:flex;justify-content:space-around;margin-bottom:5px;position:relative;z-index:1;}
.win{width:60px;height:46px;border-radius:10px 10px 4px 4px;background:linear-gradient(180deg,#3a6888,#5a8eb0 65%,rgba(255,190,140,.4));border:2px solid #2a4060;position:relative;overflow:hidden;}
.win::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(255,255,255,.25) 0 2px,transparent 2px 50%,rgba(255,255,255,.25) 50% calc(50%+2px),transparent calc(50%+2px));}
.wcl,.wcr{position:absolute;top:0;bottom:0;width:9px;background:linear-gradient(180deg,var(--pk),var(--pl));opacity:.82;}
.wcl{left:0;border-radius:0 0 6px 0;}.wcr{right:0;border-radius:0 0 0 6px;}
.wsill{position:absolute;bottom:0;left:0;right:0;height:4px;background:var(--wl);}
.chalkboard{position:absolute;top:5px;left:50%;transform:translateX(-50%);background:linear-gradient(180deg,#182418,#101810);border:2px solid #2a3a2a;border-radius:7px;padding:4px 12px 5px;text-align:center;white-space:nowrap;z-index:2;}
.chk-title{display:block;font-size:.46rem;color:rgba(170,210,170,.5);letter-spacing:.12em;margin-bottom:2px;}
.chk-items{display:flex;gap:10px;font-size:.54rem;color:rgba(190,230,190,.68);}
.shelf{height:7px;background:linear-gradient(180deg,var(--wl),var(--w));box-shadow:0 3px 0 var(--wd);flex-shrink:0;}
.counter-area{flex:1;min-height:0;position:relative;background:linear-gradient(180deg,#361c0c 0%,#281408 38%,#b07050 38.5%,#c88060 100%);}
.counter-area::after{content:'';position:absolute;inset:38.5% 0 0 0;background:repeating-linear-gradient(90deg,transparent 0,transparent 79px,rgba(0,0,0,.12) 79px,rgba(0,0,0,.12) 80px);pointer-events:none;}
.counter-bar{position:absolute;left:4%;right:4%;top:38%;z-index:4;}
.c-surface{height:13px;background:linear-gradient(180deg,rgba(255,255,255,.2),var(--wl) 35%,var(--w));border-radius:3px 3px 0 0;border:2px solid var(--wd);border-bottom:none;position:relative;overflow:hidden;}
.c-surface::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);animation:cshim 4s ease-in-out 1s infinite;}
@keyframes cshim{0%,100%{left:-100%}50%{left:160%}}
.c-front{height:36px;background:linear-gradient(180deg,var(--w),#7a3e18 70%,#5a2c0c);border:2px solid var(--wd);border-top:none;box-shadow:0 5px 14px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;}
.c-label{font-size:.58rem;color:rgba(255,255,255,.15);font-weight:700;letter-spacing:.1em;}
.footrest{position:absolute;left:6%;right:6%;top:calc(38% + 52px);height:5px;background:linear-gradient(180deg,var(--wl),var(--w));border-radius:3px;border:1px solid var(--wd);}
.seats{position:absolute;left:4%;right:4%;top:38%;z-index:5;display:flex;justify-content:space-around;transform:translateY(-100%);}
.seat{display:flex;flex-direction:column;align-items:center;position:relative;}
.cat-wrap{cursor:pointer;position:relative;animation:idleF 2.2s ease-in-out infinite;}
.cat-wrap.new{animation:catIn .45s cubic-bezier(.18,1.4,.5,1),idleF 2.2s .45s ease-in-out infinite;}
@keyframes idleF{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes catIn{0%{transform:translateY(8px) scale(.4);opacity:0}60%{transform:translateY(-6px) scale(1.1)}100%{transform:translateY(0);opacity:1}}
.cat-svg{display:block;overflow:visible;}
@keyframes tailWag{0%,100%{transform:rotate(-14deg)}50%{transform:rotate(16deg)}}
@keyframes blink{0%,88%,100%{transform:scaleY(1)}92%{transform:scaleY(.06)}}
.ctail{transform-box:fill-box;transform-origin:left bottom;animation:tailWag 1.5s ease-in-out infinite;}
.ceyes{transform-box:fill-box;transform-origin:center;animation:blink 4.5s ease-in-out infinite;}
.empty-seat{font-size:1rem;opacity:.25;padding:4px;}
.stool{display:flex;flex-direction:column;align-items:center;margin-top:2px;}
.st-top{width:22px;height:6px;background:linear-gradient(180deg,var(--wl),var(--w));border-radius:10px;border:1.5px solid var(--wd);box-shadow:0 2px 0 var(--wd);}
.st-leg{width:3px;height:14px;background:var(--wd);}
.st-base{width:16px;height:3px;background:var(--wd);border-radius:2px;}
.cup-area{position:absolute;top:-16px;right:-16px;pointer-events:none;}
.stmg{display:flex;gap:3px;margin-bottom:1px;}
.sl{width:2px;border-radius:2px;background:rgba(255,255,255,.4);animation:stmup 2.1s ease-out infinite;}
.sl:nth-child(1){height:7px}.sl:nth-child(2){height:10px;animation-delay:.65s}.sl:nth-child(3){height:6px;animation-delay:1.3s}
@keyframes stmup{0%{transform:translateY(0) scaleX(1);opacity:.5}100%{transform:translateY(-12px) scaleX(.3);opacity:0}}
.cup-ico{font-size:.58rem;display:block;text-align:center;}
.hpico{position:absolute;top:-13px;right:-2px;font-size:.58rem;pointer-events:none;}
.sbub{position:absolute;bottom:calc(100%+3px);left:50%;transform:translateX(-50%);background:rgba(255,255,255,.95);color:#2a1008;border-radius:9px;padding:3px 8px;font-size:.54rem;font-weight:700;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.18);pointer-events:none;animation:bubUp .85s ease-out forwards;z-index:10;}
@keyframes bubUp{0%{opacity:0;transform:translateX(-50%) translateY(4px)}10%{opacity:1}75%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-12px)}}
.sleepz{position:absolute;top:-14px;right:-4px;font-size:.52rem;font-weight:900;color:var(--mi);pointer-events:none;animation:zzz 2s ease-out forwards;}
@keyframes zzz{0%{opacity:0;transform:translateY(0) rotate(-5deg)}15%{opacity:1}100%{opacity:0;transform:translateY(-14px) rotate(8deg)}}
.cust{position:absolute;z-index:6;top:calc(38% + 52px);transition:left 1.4s cubic-bezier(.4,0,.2,1);pointer-events:none;}
.cust svg{animation:cbob .4s ease-in-out infinite;}
@keyframes cbob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
.cust.leaving{transition:left 1.2s ease-in;}
.cust.leaving svg{animation:none;}
.sc-coin{position:absolute;z-index:9;font-size:.76rem;font-weight:900;color:var(--gl);text-shadow:0 0 6px rgba(255,200,80,.5);pointer-events:none;animation:scup 1.1s ease-out forwards;}
@keyframes scup{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-44px) scale(.7);opacity:0}}
.deco-item{position:absolute;z-index:6;font-size:1.3rem;pointer-events:none;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3));animation:decoF 4s ease-in-out infinite;}
@keyframes decoF{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}

/* ── BOTTOM ── */
.bot{flex-shrink:0;background:linear-gradient(180deg,rgba(8,3,1,.99),#040100);border-top:1px solid rgba(255,200,80,.07);display:flex;flex-direction:column;max-height:56vh;}
.tap-z{display:flex;align-items:center;gap:12px;padding:8px 13px 7px;border-bottom:1px solid rgba(255,255,255,.04);}
#fishbtn{width:64px;height:64px;border-radius:50%;border:none;flex-shrink:0;background:radial-gradient(circle at 33% 28%,#fff4d8,var(--gl) 42%,var(--g) 78%,#902800);box-shadow:inset 0 3px 6px rgba(255,255,255,.55),inset 0 -5px 8px rgba(0,0,0,.2),0 5px 0 #5a1800,0 8px 18px rgba(0,0,0,.45);font-size:1.75rem;cursor:pointer;user-select:none;transition:transform .08s,box-shadow .08s;}
#fishbtn:active{transform:translateY(5px);box-shadow:inset 0 3px 6px rgba(255,255,255,.45),0 1px 0 #5a1800,0 2px 6px rgba(0,0,0,.3);}
#fishbtn:hover:not(:active){transform:scale(1.06);}
.tap-r{flex:1;}.tap-lbl{font-size:.6rem;color:rgba(255,255,255,.3);margin-bottom:6px;}
.cr{display:flex;align-items:center;gap:7px;}
.cbg{flex:1;height:8px;background:rgba(255,255,255,.06);border-radius:6px;overflow:hidden;}
.cf{height:100%;width:0%;border-radius:6px;background:linear-gradient(90deg,var(--mi),var(--pu));transition:width .13s,background .3s;}
.ct{font-size:.65rem;font-weight:700;color:rgba(255,255,255,.4);min-width:68px;}
.ar{display:flex;gap:7px;padding:7px 11px;border-bottom:1px solid rgba(255,255,255,.04);}
.ac{flex:1;border-radius:12px;padding:8px 9px;display:flex;align-items:center;justify-content:space-between;border:1px solid rgba(255,255,255,.07);}
.ac.boost{background:linear-gradient(135deg,rgba(244,135,158,.15),rgba(244,135,158,.03));}
.ac.gacha{background:linear-gradient(135deg,rgba(180,138,244,.15),rgba(180,138,244,.03));}
.ainfo b{display:block;font-size:.72rem;margin-bottom:1px;}.ainfo span{font-size:.55rem;opacity:.4;}
.ac.boost .ainfo b{color:#ffb0c4;}.ac.gacha .ainfo b{color:#d4b8fc;}
.ab{border:none;border-radius:10px;padding:8px 11px;font-weight:900;font-size:.7rem;font-family:inherit;color:#fff;cursor:pointer;transition:transform .08s;white-space:nowrap;flex-shrink:0;}
.ab:active{transform:translateY(2px);}
.ab.pk{background:linear-gradient(180deg,var(--pl),var(--pk));box-shadow:0 3px 0 #ae2a58,0 5px 12px rgba(244,135,158,.2);}
.ab.pu{background:linear-gradient(180deg,#cdb4fc,var(--pu));box-shadow:0 3px 0 #5030a0,0 5px 12px rgba(180,138,244,.2);}
.ab:disabled{background:rgba(255,255,255,.07)!important;box-shadow:none!important;color:rgba(255,255,255,.2);cursor:not-allowed;}
.tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.05);background:rgba(0,0,0,.15);}
.tab{flex:1;padding:8px 2px 7px;font-size:.56rem;font-weight:700;font-family:inherit;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.35);position:relative;transition:color .18s;}
.tab.on{color:var(--gl);}
.tab.on::after{content:'';position:absolute;bottom:0;left:12%;right:12%;height:2px;background:linear-gradient(90deg,transparent,var(--g),var(--gl),var(--g),transparent);box-shadow:0 0 5px rgba(247,198,106,.4);}
.tbdg{display:inline-block;background:var(--pk);color:#fff;font-size:.42rem;padding:1px 4px;border-radius:5px;margin-left:2px;vertical-align:middle;}
.hint{display:none;align-items:center;gap:5px;background:rgba(110,206,194,.06);border:1px solid rgba(110,206,194,.18);border-radius:8px;padding:5px 9px;margin:5px 10px 0;font-size:.6rem;color:var(--mi);font-weight:700;}
.hint.on{display:flex;}
.tc{flex:1;overflow-y:auto;padding:7px 11px 4px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.05) transparent;}

/* SHOP */
.catcard{display:flex;align-items:center;gap:9px;border-radius:13px;padding:9px 10px;margin-bottom:7px;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.08);}
.catcard.locked{background:rgba(255,255,255,.025);}
.catcard.open{background:linear-gradient(135deg,rgba(255,255,255,.048),rgba(255,255,255,.018));}
.catcard.open::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--gl),var(--g));border-radius:3px 0 0 3px;box-shadow:0 0 6px rgba(232,160,48,.35);}
.lock-ico{font-size:1.3rem;width:40px;text-align:center;opacity:.22;flex-shrink:0;}
.cico{width:44px;height:48px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:11px;background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.07);}
.cinf{flex:1;min-width:0;}
.cnm{font-weight:900;font-size:.8rem;letter-spacing:.01em;}
.cds{font-size:.57rem;color:rgba(255,255,255,.36);margin-top:2px;}
.cst{font-size:.54rem;color:rgba(255,255,255,.26);margin-top:3px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.cuth{font-size:.57rem;color:rgba(255,200,80,.5);margin-top:2px;}
.lvb{display:inline-block;background:linear-gradient(135deg,var(--gl),var(--g));color:#3a1800;font-size:.44rem;font-weight:900;padding:2px 5px;border-radius:5px;margin-left:3px;vertical-align:middle;}
.rbdg{display:inline-flex;background:rgba(110,206,194,.1);border:1px solid rgba(110,206,194,.2);border-radius:5px;padding:1px 5px;font-size:.52rem;color:var(--mi);font-weight:700;}
.hpb{display:inline-flex;font-size:.52rem;font-weight:700;}
.cbtns{display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0;}
.bb,.ub{border:none;border-radius:9px;padding:7px 9px;font-weight:900;font-size:.65rem;font-family:inherit;white-space:nowrap;min-width:70px;cursor:pointer;transition:transform .08s;}
.bb:active,.ub:active{transform:translateY(2px);}
.bb{color:#fff;background:linear-gradient(180deg,var(--cl),var(--ca));box-shadow:0 3px 0 #7a3808,0 4px 10px rgba(232,145,74,.18);}
.bb:disabled{background:rgba(255,255,255,.06);box-shadow:none;color:rgba(255,255,255,.18);cursor:not-allowed;}
.ub{color:var(--gl);background:rgba(232,160,48,.1);border:1px solid rgba(232,160,48,.2);}
.ub:disabled{background:transparent;border-color:rgba(255,255,255,.06);color:rgba(255,255,255,.18);cursor:not-allowed;}

/* DECO */
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.dcard{background:rgba(255,255,255,.038);border-radius:13px;padding:11px 10px 10px;border:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;align-items:center;text-align:center;gap:3px;}
.dcard.owned{border-color:rgba(110,206,194,.3);background:rgba(110,206,194,.06);}
.dem{font-size:1.9rem;margin-bottom:2px;filter:drop-shadow(0 2px 5px rgba(0,0,0,.3));}
.dnm{font-size:.73rem;font-weight:900;}
.dds{font-size:.57rem;color:rgba(255,255,255,.38);line-height:1.35;}
.dmlt{font-size:.58rem;color:var(--mi);font-weight:700;background:rgba(110,206,194,.1);border:1px solid rgba(110,206,194,.18);border-radius:5px;padding:2px 7px;margin-bottom:3px;}
.dbtn{border:none;border-radius:9px;padding:6px 0;width:100%;font-size:.67rem;font-weight:900;font-family:inherit;cursor:pointer;color:#fff;background:linear-gradient(180deg,var(--cl),var(--ca));box-shadow:0 3px 0 #7a3808;transition:transform .08s;}
.dbtn:active{transform:translateY(2px);}
.dbtn.got{background:rgba(110,206,194,.14);box-shadow:none;color:var(--mi);cursor:default;border:1px solid rgba(110,206,194,.22);}
.dbtn:disabled{background:rgba(255,255,255,.06);box-shadow:none;color:rgba(255,255,255,.18);cursor:not-allowed;}

/* MISSIONS */
.mrst{font-size:.52rem;color:rgba(255,255,255,.28);text-align:center;margin-bottom:8px;background:rgba(255,255,255,.03);border-radius:8px;padding:5px;}
.mc{background:rgba(255,255,255,.038);border-radius:12px;padding:10px 11px;margin-bottom:7px;border:1px solid rgba(110,206,194,.12);}
.mc.done{border-color:rgba(232,160,48,.22);background:rgba(232,160,48,.04);}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.mn{font-weight:700;font-size:.75rem;}.mr{font-size:.58rem;font-weight:700;color:var(--pu);background:rgba(180,138,244,.12);padding:2px 6px;border-radius:6px;border:1px solid rgba(180,138,244,.18);}
.mbar{height:6px;background:rgba(255,255,255,.06);border-radius:5px;overflow:hidden;margin-bottom:5px;}
.mfill{height:100%;background:linear-gradient(90deg,var(--mi),#3ab8a8);border-radius:5px;transition:width .4s;}
.mft{display:flex;align-items:center;justify-content:space-between;}
.mp{font-size:.53rem;opacity:.35;}
.mcb{border:none;border-radius:7px;padding:4px 9px;font-size:.62rem;font-weight:900;font-family:inherit;cursor:pointer;background:linear-gradient(180deg,var(--cl),var(--ca));box-shadow:0 2px 0 #7a3808;color:#fff;}

/* PRESTIGE */
.pcrd{background:linear-gradient(135deg,rgba(232,160,48,.1),rgba(244,135,158,.05));border:1px solid rgba(232,160,48,.2);border-radius:13px;padding:12px 13px;margin-bottom:8px;}
.pcrd h3{font-size:.86rem;color:var(--gl);margin-bottom:5px;}
.pcrd p{font-size:.66rem;color:rgba(255,255,255,.46);line-height:1.55;margin-bottom:8px;}
.pgrd{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.pstat{background:rgba(0,0,0,.22);border-radius:8px;padding:7px;text-align:center;}
.pv{font-size:1.05rem;font-weight:900;color:var(--gl);}.pk2{font-size:.54rem;opacity:.44;margin-top:1px;}
.pbar2{height:6px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;margin-bottom:10px;}
.pfill{height:100%;background:linear-gradient(90deg,var(--gl),var(--g));border-radius:4px;transition:width .4s;}
.pdo{border:none;border-radius:10px;padding:10px;font-weight:900;font-size:.82rem;font-family:inherit;color:#fff;cursor:pointer;background:linear-gradient(180deg,var(--gl),var(--g));box-shadow:0 4px 0 var(--gd);width:100%;transition:transform .08s;}
.pdo:active{transform:translateY(3px);}
.pdo:disabled{background:rgba(255,255,255,.08);box-shadow:none;color:rgba(255,255,255,.3);cursor:not-allowed;}
.phist{font-size:.6rem;color:rgba(255,255,255,.34);text-align:center;margin-top:8px;}
.hpcrd{background:rgba(255,255,255,.03);border-radius:11px;padding:10px 12px;margin-bottom:7px;border:1px solid rgba(110,206,194,.1);}
.hpcrd h3{font-size:.8rem;color:var(--mi);margin-bottom:7px;}
.hprow{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.hprow span:first-child{font-size:.74rem;flex:1;}
.hptrack{flex:2;height:5px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;}
.hpfill{height:100%;border-radius:4px;transition:width .4s;}
.hpval{font-size:.6rem;min-width:28px;text-align:right;}

/* COLLECTION */
.cgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
.cc{aspect-ratio:1;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:rgba(255,255,255,.038);border:1px solid rgba(255,255,255,.07);}
.cc.has{border-color:rgba(180,138,244,.28);box-shadow:0 0 7px rgba(180,138,244,.1);}
.cc.lk{opacity:.2;filter:grayscale(1);}
.ccn{font-size:.45rem;opacity:.46;}

/* OVERLAYS */
.ov{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.78);z-index:50;padding:20px;backdrop-filter:blur(7px);}
.ov.on{display:flex;}
.ocard{background:linear-gradient(180deg,#1e0c04,#0e0602);border:1px solid rgba(255,200,80,.13);border-radius:22px;padding:24px 20px;text-align:center;max-width:300px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.65);animation:popin .2s cubic-bezier(.18,1.4,.5,1);}
@keyframes popin{from{transform:scale(.72);opacity:0}}
.oem{font-size:2.7rem;margin-bottom:9px;display:block;}
.otit{font-size:1rem;font-weight:900;color:var(--gl);margin-bottom:6px;}
.odes{font-size:.73rem;color:rgba(255,255,255,.6);line-height:1.65;margin-bottom:16px;white-space:pre-line;}
.obtn{border:none;border-radius:11px;padding:10px 24px;font-weight:900;font-size:.82rem;font-family:inherit;color:#fff;cursor:pointer;background:linear-gradient(180deg,var(--cl),var(--ca));box-shadow:0 4px 0 #7a3808;transition:transform .08s;}
.obtn:active{transform:translateY(3px);}
.rtag{display:inline-block;padding:3px 12px;border-radius:16px;font-size:.63rem;font-weight:900;letter-spacing:.05em;margin-bottom:12px;}
.rc .rtag{background:rgba(255,255,255,.09);color:rgba(255,255,255,.62);}
.rr .rtag{background:rgba(100,180,255,.16);color:#8cd0ff;}
.rsr .ocard{box-shadow:0 0 40px rgba(180,138,244,.5),0 20px 60px rgba(0,0,0,.6);}
.rsr .rtag{background:rgba(180,138,244,.2);color:var(--pu);}
.rl .ocard{box-shadow:0 0 70px rgba(232,160,48,.8),0 20px 60px rgba(0,0,0,.6);animation:popin .2s cubic-bezier(.18,1.4,.5,1),lp 1.3s .3s ease-in-out infinite;}
.rl .rtag{background:linear-gradient(90deg,var(--gl),var(--g));color:#3a1800;}
@keyframes lp{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
.gem{font-size:2.9rem;display:block;margin-bottom:8px;}
.gem.shake{animation:gshk .48s ease;}
@keyframes gshk{20%{transform:rotate(-9deg) scale(1.1)}40%{transform:rotate(9deg) scale(1.15)}60%{transform:rotate(-6deg) scale(1.1)}80%{transform:rotate(6deg)}}
/* FX */
.flash{position:fixed;inset:0;pointer-events:none;z-index:40;opacity:0;transition:opacity .1s;}
@keyframes shake{0%,100%{transform:translate(0,0)}10%{transform:translate(-4px,-2px)}20%{transform:translate(4px,2px)}30%{transform:translate(-3px,1px)}40%{transform:translate(3px,-1px)}50%{transform:translate(-2px,2px)}60%{transform:translate(2px,-2px)}70%{transform:translate(-1px,1px)}80%{transform:translate(1px,-1px)}}
.shake-me{animation:shake .38s ease-out;}
@keyframes lvup{0%{opacity:0;transform:scale(.4)}30%{opacity:1;transform:scale(1.2)}70%{opacity:1}100%{opacity:0;transform:scale(.85) translateY(-46px)}}
.lvup-txt{position:fixed;font-weight:900;font-size:1rem;text-shadow:0 0 12px currentColor,0 2px 4px rgba(0,0,0,.5);pointer-events:none;z-index:99;animation:lvup .9s ease-out forwards;}
@keyframes cpop{0%{opacity:1;transform:translateY(0) scale(.9)}20%{transform:translateY(-8px) scale(1.18)}100%{opacity:0;transform:translateY(-54px) scale(.75)}}
.cp{position:fixed;pointer-events:none;z-index:99;font-weight:900;color:var(--gl);text-shadow:0 0 8px rgba(255,200,80,.6);animation:cpop 1s ease-out forwards;}
.hfx{position:fixed;pointer-events:none;z-index:99;animation:hfxA .9s ease-out forwards;}
@keyframes hfxA{0%{transform:translateY(0) scale(.5) rotate(-10deg);opacity:1}50%{transform:translateY(-28px) scale(1.2);opacity:1}100%{transform:translateY(-52px) scale(.7);opacity:0}}
@keyframes ripple{0%{transform:scale(0);opacity:.7}100%{transform:scale(4);opacity:0}}
.ripple{position:absolute;width:40px;height:40px;border-radius:50%;background:rgba(255,200,80,.35);pointer-events:none;animation:ripple .5s ease-out forwards;}
.conf{position:fixed;top:-10px;width:8px;height:8px;border-radius:2px;z-index:60;pointer-events:none;animation:cfall 1.6s ease-in forwards;}
@keyframes cfall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
.tstack{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:5px;align-items:center;z-index:80;pointer-events:none;}
.toast{background:rgba(12,4,1,.97);color:#fff;padding:7px 14px;border-radius:9px;font-size:.68rem;font-weight:700;box-shadow:0 3px 14px rgba(0,0,0,.45);border:1px solid rgba(255,200,80,.1);animation:tin .3s ease-out,tout .4s 2.2s ease-in forwards;white-space:nowrap;}
.toast.g{border-color:rgba(110,206,194,.22);}.toast.p{border-color:rgba(180,138,244,.22);}.toast.gold{border-color:rgba(232,160,48,.4);color:var(--gl);}
@keyframes tin{from{transform:translateY(9px);opacity:0}}@keyframes tout{to{transform:translateY(9px);opacity:0}}
.share-bar{display:flex;align-items:center;gap:8px;padding:6px 11px;border-bottom:1px solid rgba(255,255,255,.04);}
.share-btn{flex:1;border:none;border-radius:11px;padding:8px;font-size:.72rem;font-weight:900;font-family:inherit;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;gap:5px;transition:transform .08s;}
.share-btn:active{transform:translateY(2px);}
.share-x{background:linear-gradient(180deg,#444,#111);box-shadow:0 3px 0 #000;}
.share-score{font-size:.58rem;color:rgba(255,255,255,.32);text-align:center;flex-shrink:0;line-height:1.4;}
footer{text-align:center;font-size:.47rem;opacity:.13;padding:3px;flex-shrink:0;}

/* CAT IMAGES */
.cat-frame{border-radius:0;overflow:visible;background:transparent;border:none;box-shadow:none;display:flex;align-items:flex-end;justify-content:center;width:72px;height:82px;cursor:pointer;filter:drop-shadow(0 4px 8px rgba(0,0,0,.45));}
.cat-frame img{width:72px;height:82px;object-fit:contain;pointer-events:none;}
.cat-frame.unhappy{filter:drop-shadow(0 3px 6px rgba(0,0,0,.4)) saturate(.3) brightness(.7);}
.cat-frame.happy{filter:drop-shadow(0 4px 8px rgba(0,0,0,.45)) drop-shadow(0 0 10px rgba(110,206,194,.45));}
.mini-cat-img{width:42px;height:46px;object-fit:contain;border-radius:8px;background:transparent;}

function todayKey(){const d=new Date();return`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;}
function pickDaily(dk){
  const seed=dk.split(/\D+/).reduce((s,n,i)=>s+parseInt(n||0)*(i+7),0);
  const arr=[...DAILY_BASE];
  for(let i=arr.length-1;i>0;i--){const j=Math.abs(Math.floor(Math.sin(seed*31+i)*10000))%(i+1);[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr.slice(0,3);
}
function checkDailyReset(){
  const d=todayKey();
  if(dDate!==d){dDate=d;dStats={taps:0,hires:0,pulls:0,boosts:0,pets:0,dearn:0};dClaimed={};}
  if(!dMissions.length)dMissions=pickDaily(dDate);
}

function getACtx(){return actx||(actx=new(window.AudioContext||window.webkitAudioContext)());}
function beep(f,dur,type,vol,delay){
  if(!sfxOn)return;
  try{const c=getACtx(),ti=c.currentTime+(delay||0),o=c.createOscillator(),g=c.createGain();
  o.type=type||'sine';o.frequency.value=f;
  g.gain.setValueAtTime(.0001,ti);g.gain.exponentialRampToValueAtTime(vol||.12,ti+.015);g.gain.exponentialRampToValueAtTime(.0001,ti+dur);
  o.connect(g);g.connect(c.destination);o.start(ti);o.stop(ti+dur+.02);}catch(e){}
}

function fmt(n){n=Math.floor(n);if(n>=1e9)return(n/1e9).toFixed(2)+'B';if(n>=1e6)return(n/1e6).toFixed(2)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return String(n);}
function catRU(c){return c.rate*(1+0.8*catLvs[c.id]);}
function hpMult(){const cs=CATS_BASE.filter(c=>owned[c.id]>0);if(!cs.length)return 1;const avg=cs.reduce((s,c)=>s+catHp[c.id],0)/cs.length;return avg>=80?1.2:avg<25?0.75:0.75+(avg-25)*0.0073;}
function evRM(){return curEvent&&curEvent.rateMult?curEvent.rateMult:1;}
function gameRate(){return CATS_BASE.reduce((s,c)=>s+owned[c.id]*catRU(c),0)*boostMult*gBonus*pMult*hpMult()*evRM()*decoMult;}

function upgCost(c){return Math.ceil(c.base*6*Math.pow(3,catLvs[c.id]));}
function comboMult(){return COMBO_M[Math.min(combo,COMBO_M.length-1)];}

function renderSeats(){
  const pool=[];CATS_BASE.forEach(c=>{for(let i=0;i<owned[c.id];i++)pool.push(c.id);});
  const ps=pool.slice(0,6).join(',');
  if(ps===prevPool.join(','))return;
  prevPool=pool.slice(0,6);
  const el=document.getElementById('seats');el.innerHTML='';
  for(let i=0;i<6;i++){
    const div=document.createElement('div');div.className='seat';
    div.style.cssText=`position:absolute;left:${SEAT_LEFTS[i]};bottom:0;display:flex;flex-direction:column;align-items:center;`;
    if(pool[i]){
      const hp=catHp[pool[i]];const hcol=hp>70?'#6ecec2':hp>30?'#f7c86a':'#f4879e';
      const wrap=document.createElement('div');
      wrap.className='cat-wrap';

      wrap.style.animationDelay=(i*0.3)+'s';
      const catFrame=document.createElement('div');

      const catImg=document.createElement('img');

      wrap.appendChild(catFrame);
      const cup=document.createElement('div');cup.className='cup-area';
      cup.innerHTML=`<div class="stmg"><div class="sl"></div><div class="sl"></div><div class="sl"></div></div><span class="cup-ico">☕</span>`;
      wrap.appendChild(cup);
      const hi=document.createElement('div');hi.className='hpico';hi.style.color=hcol;hi.textContent=hp>70?'♡':hp<30?'…':'';
      wrap.appendChild(hi);
      wrap.onclick=ev=>{
        spawnHeart(ev.clientX,ev.clientY);
        const bub=document.createElement('div');bub.className='sbub';
        bub.textContent=t().catSays[Math.floor(Math.random()*t().catSays.length)];
        wrap.style.position='relative';wrap.appendChild(bub);setTimeout(()=>bub.remove(),900);

function spawnCustomer(){
  const pool=[];CATS_BASE.forEach(c=>{for(let i=0;i<owned[c.id];i++)pool.push(i);});
  if(!pool.length||customers.filter(c=>c.state!=='leaving').length>=4)return;
  const avail=pool.filter(i=>!custSeats[i]);if(!avail.length)return;
  const si=avail[Math.floor(Math.random()*avail.length)];
  custSeats[si]=true;
  const isGolden=curEvent&&curEvent.custMult>=100&&Math.random()<.35;
  const col=isGolden?'#d4a020':CUST_COLS[Math.floor(Math.random()*CUST_COLS.length)];
  const area=document.getElementById('cafeArea');
  const el=document.createElement('div');el.className='cust'+(isGolden?' golden':'');
  el.style.left='110%';el.innerHTML=custSVG(col,isGolden);
  area.appendChild(el);
  const custObj={el,si,col,isGolden,state:'walking',stayTimer:3000+Math.random()*4500};
  customers.push(custObj);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{el.style.left=`calc(${SEAT_LEFTS[si]} + 22px)`;}));
  setTimeout(()=>{if(custObj.state==='walking')custObj.state='sitting';},1600);
}
function updateCustomers(dt){
  for(let i=customers.length-1;i>=0;i--){
    const c=customers[i];
    if(c.state==='sitting'){
      c.stayTimer-=dt*1000;
      if(c.stayTimer<=0){
        const area=document.getElementById('cafeArea');
        const fc=document.createElement('div');fc.className='sc-coin';
        const evMult=(curEvent&&curEvent.custMult)?curEvent.custMult:1;
        fc.textContent=evMult>=100?'💰💰':'+🪙';
        fc.style.cssText=`left:${SEAT_LEFTS[c.si]};top:calc(38% - 18px);transform:translateX(-50%);`;
        area.appendChild(fc);sfx.coin();setTimeout(()=>fc.remove(),1150);
        if(c.isGolden){confetti();flash('rgba(255,220,0,.4)');shakeScreen();}
        c.state='leaving';c.el.classList.add('leaving');
        c.el.style.transition='left 1.2s ease-in';c.el.style.left='-60px';
        custSeats[c.si]=false;
        setTimeout(()=>{const idx=customers.indexOf(c);if(idx>=0)customers.splice(idx,1);c.el.remove();},1300);
      }
    }
  }
}

function updateEvents(dt){

    else document.getElementById('evtmr').textContent='残り'+Math.ceil(evTimer)+'s';

function triggerEvent(){

  curEvent=ev;evTimer=ev.dur;nextEv=120+Math.random()*180;
  const evData=t().events[EVENTS_BASE.indexOf(ev)];
  const bar=document.getElementById('evbar');

  ['shop','deco','miss','coll'].forEach(id=>document.getElementById(id+'P').style.display='none');
  document.getElementById('prestigeP').style.display='';renderPrestigeTab();
}
function doPrestigeConfirm(){
  if(coins<pThreshold())return;
  const tx=t();
  document.getElementById('povEm').textContent='⭐'.repeat(Math.min(prestige+1,8));
  document.getElementById('povDesc').textContent=tx.prestDesc(fmt(coins),(pMult+.5).toFixed(1));
  document.getElementById('povDo').textContent=tx.milestoneBtn;

}
document.getElementById('povDo').onclick=()=>{

  renderSeats();tick();
};
document.getElementById('povCx').onclick=()=>document.getElementById('povOv').classList.remove('on');

// ══════════════════════════════════════
//  MILESTONES
// ══════════════════════════════════════
function checkMS(){
  MILESTONES_BASE.forEach((m,mi)=>{
    if(totalEarned>=m.at&&!clearedMS.has(m.at)){
      const mData=t().milestones[mi];
      clearedMS.add(m.at);gems+=m.gem;
      pendingMS.push({em:m.em,t:mData.t,d:mData.d});
      sfx.ms();flash('rgba(255,220,80,.4)');shakeScreen();
    }
  });
  CATS_BASE.forEach((cat,ci)=>{
    if(totalEarned>=cat.unlock&&cat.unlock>0&&!clearedACH.has('ul_'+cat.id)){
      clearedACH.add('ul_'+cat.id);
      toastMsg(t().unlockToast(t().cats[ci].nm));
    }
  });
  showNextMS();
}
function showNextMS(){
  if(document.getElementById('msOv').classList.contains('on')||!pendingMS.length)return;
  const m=pendingMS.shift();
  document.getElementById('msEm').textContent=m.em;document.getElementById('msTit').textContent=m.t;document.getElementById('msDes').textContent=m.d;
  document.getElementById('msOv').classList.add('on');
}
document.getElementById('msClose').onclick=()=>{document.getElementById('msOv').classList.remove('on');tick();showNextMS();};

// ══════════════════════════════════════
//  GACHA
// ══════════════════════════════════════
function pickG(){const tot=GACHA_BASE.reduce((s,g)=>s+g.w,0);let r=Math.random()*tot;for(const g of GACHA_BASE){if(r<g.w)return g;r-=g.w;}return GACHA_BASE[0];}
function recalcBonus(){gBonus=GACHA_BASE.reduce((b,g)=>gOwned[g.id]?b*g.b:b,1);}
document.getElementById('gcBtn').onclick=()=>{
  if(gems<1)return;gems--;stats.pulls++;dStats.pulls=(dStats.pulls||0)+1;
  const r=pickG();const gi=GACHA_BASE.indexOf(r);const isNew=!gOwned[r.id];gOwned[r.id]=true;recalcBonus();
  const rareTxt=t().gacha[gi];const cls=gi<2?'rc':gi<4?'rr':gi<6?'rsr':'rl';
  document.getElementById('gcCard').className='ocard '+cls;
  const em=document.getElementById('gcEm');em.textContent=r.em;em.classList.remove('shake');void em.offsetWidth;em.classList.add('shake');
  document.getElementById('gcNm').textContent=['たまちゃん','もちこ','ゆきひめ','ぎんが','こがね丸','お月さま','鳳凰猫'][gi];
  document.getElementById('gcRar').textContent=rareTxt;
  document.getElementById('gcDes').textContent=t().gachaBonus(Math.round((r.b-1)*100),isNew);
  document.getElementById('gcOv').classList.add('on');
  if(cls==='rl'){sfx.gleg();confetti();flash('rgba(232,160,48,.55)');shakeScreen();}
  else if(cls==='rsr'||cls==='rr'){sfx.grare();flash('rgba(180,138,244,.3)');}
  else sfx.gcom();
  renderColl();tick();
};
document.getElementById('gcClose').onclick=()=>document.getElementById('gcOv').classList.remove('on');

// ══════════════════════════════════════
//  BOOST
// ══════════════════════════════════════
document.getElementById('bstBtn').onclick=()=>{
  if(Date.now()<boostCool)return;
  boostMult=2;boostEnd=Date.now()+60000;boostCool=Date.now()+120000;
  stats.boosts++;dStats.boosts=(dStats.boosts||0)+1;sfx.boost();flash('rgba(244,135,158,.18)');updateBoost();tick();
};
function updateBoost(){
  const tx=t();const now=Date.now(),btn=document.getElementById('bstBtn'),st=document.getElementById('bstSt');
  if(boostMult>1&&now<boostEnd){st.textContent=tx.boostActive(Math.ceil((boostEnd-now)/1000));btn.disabled=true;btn.textContent=tx.boostActiveBtn;}
  else{boostMult=1;if(now<boostCool){st.textContent=tx.boostCd(Math.ceil((boostCool-now)/1000));btn.disabled=true;btn.textContent=tx.boostBtn;}
  else{st.textContent=tx.boostSub;btn.disabled=false;btn.textContent=tx.boostBtn;}}
}

// ══════════════════════════════════════
//  COMBO
// ══════════════════════════════════════
function bumpCombo(){
  combo=Math.min(combo+1,COMBO_M.length-1);
  clearTimeout(comboTimer);comboTimer=setTimeout(()=>{combo=0;updateComboUI();},1300);
  updateComboUI();
}
function updateComboUI(){
  const fill=document.getElementById('cf'),lbl=document.getElementById('ct');
  const m=comboMult(),pct=(combo/(COMBO_M.length-1))*100;
  fill.style.width=pct+'%';
  fill.style.background=m>=8?'linear-gradient(90deg,#f4879e,#f7c86a)':m>=3?'linear-gradient(90deg,var(--pu),var(--mi))':'linear-gradient(90deg,var(--mi),var(--pu))';
  lbl.textContent=t().comboTxt(m);
  lbl.style.color=m>=8?'var(--gl)':m>=3?'var(--pu)':'rgba(255,255,255,.38)';
}

// ══════════════════════════════════════
//  TABS
// ══════════════════════════════════════
document.querySelectorAll('.tab').forEach(tab=>tab.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));tab.classList.add('on');
  const w=tab.dataset.t;
  ['shop','deco','miss','prestige','coll'].forEach(id=>document.getElementById(id+'P').style.display=w===id?'':'none');
  if(w==='miss')renderMissions();if(w==='coll')renderColl();if(w==='prestige')renderPrestigeTab();if(w==='deco')renderDecoShop();
});

// ══════════════════════════════════════
//  HINT
// ══════════════════════════════════════
function updateHint(){
  const h=document.getElementById('hint'),r=gameRate();
  for(const cat of CATS_BASE){
    const ci=CATS_BASE.indexOf(cat);const cData=t().cats[ci];
    if(totalEarned<cat.unlock){document.getElementById('hintTxt').textContent=t().hintUnlock(cData.nm,fmt(cat.unlock-totalEarned));h.classList.add('on');return;}
    const c=catCost(cat);
    if(coins<c&&r>0&&(c-coins)/r<180){document.getElementById('hintTxt').textContent=t().hintCat(cData.nm,fmt(c-coins));h.classList.add('on');return;}
  }
  const nd=DECOS_BASE.find(d=>!decoOwned[d.id]);
  if(nd&&coins<nd.cost&&r>0&&(nd.cost-coins)/r<300){
    const di=DECOS_BASE.indexOf(nd);
    document.getElementById('hintTxt').textContent=t().hintDeco(t().decos[di].nm,fmt(nd.cost-coins));h.classList.add('on');return;
  }
  h.classList.remove('on');
}

// ══════════════════════════════════════
//  TAP
// ══════════════════════════════════════
document.getElementById('fishbtn').onclick=function(){
  bumpCombo();feedAllCats();
  const ev=curEvent;const tapEv=(ev&&ev.tapMult)?ev.tapMult:1;
  const gain=Math.ceil(5*boostMult*comboMult()*pMult*tapEv*decoMult);
  coins+=gain;lifetime+=gain;totalEarned+=gain;dStats.dearn=(dStats.dearn||0)+gain;
  stats.taps++;dStats.taps=(dStats.taps||0)+1;sfx.tap();
  const r=this.getBoundingClientRect();
  spawnCoin(r.left+r.width/2,r.top-4,'+'+fmt(gain));
  if(combo>=3)spawnHeart(r.left+r.width/2+(Math.random()-.5)*30,r.top+(Math.random()-.5)*20);
  if(combo>=5)spawnHeart(r.left+r.width/2+(Math.random()-.5)*40,r.top+(Math.random()-.5)*25);
  if(combo>=7){shakeScreen();flash('rgba(255,200,80,.1)');}
  tick();
};

// ══════════════════════════════════════
//  TICK
// ══════════════════════════════════════
function tick(){
  if(!gameReady)return;
  const tx=t();
  document.getElementById('cval').textContent=fmt(coins);
  document.getElementById('gval').textContent=gems;
  document.getElementById('pstars').textContent=prestige>0?'⭐'.repeat(Math.min(prestige,5)):'';
  let flags='';if(boostMult>1)flags+=' ⚡';if(curEvent&&curEvent.rateMult)flags+=' 🐾';if(hpMult()>=1.2)flags+=' ♡';if(decoMult>1)flags+=' 🪴';
  document.getElementById('rval').textContent=tx.rateText(fmt(gameRate()),flags);
  document.getElementById('gcBtn').disabled=gems<1;
  document.getElementById('pnotif').classList.toggle('on',coins>=pThreshold());
  const mbdg=document.getElementById('mbdg');
  if(mbdg){const pnd=dMissions.filter(m=>!dClaimed[m.id]&&(dStats[m.st]||0)>=m.tgt).length;mbdg.style.display=pnd?'':'none';mbdg.textContent=pnd;}
  if(document.getElementById('shopP').style.display!=='none')renderShop();
  updateHint();checkMS();checkDailyReset();updateSeatHp();updateShareScore();
}

let lastT=Date.now();
setInterval(()=>{
  if(!gameReady)return;
  try{
    const now=Date.now(),dt=Math.min((now-lastT)/1000,.5);lastT=now;
    const earned=gameRate()*dt;coins+=earned;lifetime+=earned;totalEarned+=earned;dStats.dearn=(dStats.dearn||0)+earned;
    updateBoost();updateEvents(dt);updateHappiness(dt);
    const r=gameRate();
    if(r>0){custAccum+=dt;const freq=Math.max(1.5,7-Math.log10(Math.max(1,r)));if(custAccum>=freq){custAccum=0;spawnCustomer();}}
    zzzAccum+=dt;if(zzzAccum>9){zzzAccum=0;maybeZzz();}
    updateCustomers(dt);tick();
  }catch(e){console.warn('loop:',e);}
},250);

//  SHARE

function buildShareText(){
  const cats=CATS_BASE.filter(c=>owned[c.id]>0).map(c=>c.em).join('');
  const stars='⭐'.repeat(Math.min(prestige,5));
  if(lang==='ja'){
    return `🐱 ねこカフェ日和\n累計 ${fmt(totalEarned)} こばん稼いだ！${prestige>0?`\nのれん分け ${prestige}回 ${stars}`:''}${cats?`\n${cats} が働いてる`:''}\n\n▶ 無料で遊ぶ → https://nekocafe.itch.io\n#ねこカフェ日和 #NekoCafe #放置ゲーム`;
  } else {
    return `🐱 Neko Cafe\nEarned ${fmt(totalEarned)} coins total!${prestige>0?`\nPrestige ${prestige}x ${stars}`:''}${cats?`\n${cats} working hard`:''}\n\nPlay free → https://nekocafe.itch.io\n#NekoCafe #IdleGame #CatCafe`;
  }
}
function updateShareScore(){
  const el=document.getElementById('shareScore');
  if(!el)return;
  el.innerHTML=`🪙 ${fmt(totalEarned)}<br>${prestige>0?'⭐'.repeat(Math.min(prestige,5))+' '+prestige+'回':'まだのれん分けなし'}`;
}
document.getElementById('shareXBtn').onclick=()=>{
  const txt=buildShareText();
  const url='https://twitter.com/intent/tweet?text='+encodeURIComponent(txt);
  window.open(url,'_blank');
  sfx.ms();
  toastMsg(lang==='ja'?'Xでシェアしました！':'Shared on X!','gold');
};
document.getElementById('sndBtn').onclick=e=>{sfxOn=!sfxOn;e.target.textContent=sfxOn?'🔊':'🔇';};
document.getElementById('ngtBtn').onclick=()=>{nightMode=!nightMode;applyNight();};
document.getElementById('langBtn').onclick=()=>{
  lang=lang==='ja'?'en':'ja';
  try{localStorage.setItem('nekocafe_lang',lang);}catch(e){}
  try{applyLang();}catch(e){}
  prevPool=[];
  try{renderSeats();}catch(e){}
  try{renderColl();}catch(e){}
  try{renderMissions();}catch(e){}
  if(document.getElementById('decoP').style.display!=='none')try{renderDecoShop();}catch(e){}
  if(document.getElementById('prestigeP').style.display!=='none')try{renderPrestigeTab();}catch(e){}
  tick();
};
document.getElementById('savBtn').onclick=()=>{
  let ok=false;try{ok=saveGame();}catch(e){}
  const b=document.getElementById('savBtn');
  b.textContent=ok?'✅':'❌';setTimeout(()=>b.textContent='💾',1600);

setInterval(saveGame,5000);

// ══════════════════════════════════════
//  OFFLINE
// ══════════════════════════════════════
function handleOffline(ls){
  const elapsed=Math.min((Date.now()-ls)/1000,8*3600);if(elapsed<60)return;
  const earned=Math.floor(gameRate()*elapsed);if(!earned)return;
  coins+=earned;lifetime+=earned;totalEarned+=earned;
  const h=Math.floor(elapsed/3600),m=Math.floor((elapsed%3600)/60);
  const timeStr=lang==='ja'?`${h>0?h+'時間':''}${m}分`:`${h>0?h+'h ':''}${m}m`;
  document.getElementById('offDes').textContent=t().offDesc(timeStr,fmt(earned));
  document.getElementById('offClose').textContent=t().receive;
  document.getElementById('offOv').classList.add('on');
}
document.getElementById('offClose').onclick=()=>{document.getElementById('offOv').classList.remove('on');tick();};

// ══════════════════════════════════════
//  INIT
// ══════════════════════════════════════
function initGame(){
  gameReady=true;
  if(!Object.values(owned).some(v=>v>0))owned['mike']=1;
  calcDecoMult();checkDailyReset();
  nightMode=new Date().getHours()>=18||new Date().getHours()<6;
  applyNight();
  renderSeats();renderDecoScene();renderColl();renderMissions();
  tick();updateComboUI();
}

// Check saved language - wrapped in try/catch for environments where localStorage is blocked
try{
  const savedLang=localStorage.getItem('nekocafe_lang');
  const lastSave=loadGame();
  if(savedLang){
    lang=savedLang;
    setLang(lang);
    if(lastSave)setTimeout(()=>handleOffline(lastSave),600);
  }
}catch(e){
  // localStorage not available - just show language screen
  console.log('localStorage not available, showing lang screen');
}
